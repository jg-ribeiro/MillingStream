<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milling Stream API Monitor</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Socket.io Client -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f172a',
                        cardBg: '#1e293b'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0f172a; }
        pre::-webkit-scrollbar { width: 8px; height: 8px; }
        pre::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        pre::-webkit-scrollbar-track { background: #1e293b; }
    </style>
</head>
<body class="text-slate-200 h-screen flex flex-col p-2 md:p-4 overflow-hidden">

    <div class="w-full max-w-6xl mx-auto bg-[#1e293b] rounded-xl shadow-2xl border border-slate-700 flex flex-col h-full overflow-hidden">
        
        <!-- Parte Superior: 40% do espaço (Header + Status + Update) -->
        <div class="flex-[3] p-6 md:p-8 flex flex-col justify-center border-b border-slate-700/50">
            <!-- 1. Header -->
            <header class="mb-auto">
                <h1 class="text-3xl md:text-4xl font-bold text-white tracking-tight border-l-4 border-blue-500 pl-4">
                    Milling Stream API
                </h1>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-4">
                <!-- 2. Seção Status -->
                <section class="flex flex-col justify-center">
                    <h2 class="text-xs font-semibold uppercase tracking-[0.2em] text-slate-500 mb-3">Status do Sistema</h2>
                    <div>
                        <div id="status-badge" class="inline-flex items-center px-4 py-2 rounded-lg text-base font-bold bg-slate-800 text-slate-400 border border-slate-700 transition-all duration-500">
                            <span id="status-text">AGUARDANDO CONEXÃO</span>
                        </div>
                    </div>
                </section>

                <!-- 3. Seção Atualização -->
                <section class="flex flex-col justify-center md:border-l md:border-slate-700/50 md:pl-8">
                    <h2 class="text-xs font-semibold uppercase tracking-[0.2em] text-slate-500 mb-3">Última Sincronização</h2>
                    <p id="last-update" class="text-2xl md:text-3xl font-mono text-blue-400 font-bold tabular-nums">--/--/---- --:--:--</p>
                </section>
            </div>
        </div>

        <!-- Parte Inferior: 60% do espaço (Seção de Dados) -->
        <div class="flex-[7] p-6 md:p-8 flex flex-col min-h-0 bg-slate-900/50">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-2">
                    <h2 class="text-xs font-semibold uppercase tracking-[0.2em] text-slate-500">Payload de Dados</h2>
                    <span class="px-2 py-0.5 rounded text-[10px] bg-slate-800 text-slate-400 border border-slate-700">JSON</span>
                </div>
                <button id="btn-get-data" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-lg text-sm font-bold transition-all active:scale-95 shadow-lg shadow-blue-900/40 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                    Atualizar Dados
                </button>
            </div>
            
            <div class="flex-1 min-h-0 relative rounded-lg border border-slate-800 overflow-hidden shadow-inner">
                <pre id="json-display" class="absolute inset-0 p-4 text-emerald-400 font-mono text-sm overflow-auto scrollbar-thin scrollbar-thumb-slate-700 scrollbar-track-transparent">{}</pre>
            </div>
        </div>
    </div>

    <script>
        // Configuração do Socket.io
        const socket = io('http://localhost:5000');
        
        const statusBadge = document.getElementById('status-badge');
        const statusText = document.getElementById('status-text');
        const lastUpdateText = document.getElementById('last-update');
        const jsonDisplay = document.getElementById('json-display');
        const btnGetData = document.getElementById('btn-get-data');

        // Formatação de data (DD/MM/YYYY HH:mm:ss)
        function formatDate(dateString) {
            const date = new Date(dateString);
            if (isNaN(date)) return dateString;
            
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const year = date.getFullYear();
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');
            
            return `${day}/${month}/${year} ${hours}:${minutes}:${seconds}`;
        }

        // 1. Ao conectar, solicita o status inicial
        socket.on('connect', () => {
            console.log('Conectado ao servidor Socket.io');
            socket.emit('stats');
        });

        // 2. Listener: api_status (Estado e última atualização)
        socket.on('api_status', (data) => {
            console.log('Status recebido:', data);

            const isOnline = data.stats === 'online';
            statusText.textContent = data.stats.toUpperCase();
            
            if (isOnline) {
                statusBadge.classList.replace('bg-slate-700', 'bg-emerald-900/30');
                statusBadge.classList.replace('text-slate-300', 'text-emerald-400');
                statusBadge.classList.replace('border-slate-600', 'border-emerald-500/50');
            } else {
                statusBadge.classList.replace('bg-emerald-900/30', 'bg-red-900/30');
                statusBadge.classList.replace('text-emerald-400', 'text-red-400');
                statusBadge.classList.replace('border-emerald-500/50', 'border-red-500/50');
            }

            if (data.last_update) {
                lastUpdateText.textContent = formatDate(data.last_update);
            }
        });

        // 3. Listener: api_data (Dados brutos do cache)
        socket.on('api_data', (data) => {
            console.log('Dados recebidos:', data);
            jsonDisplay.textContent = JSON.stringify(data, null, 4);
        });

        // 4. Emitter: Solicitar dados ao clicar no botão
        btnGetData.addEventListener('click', () => {
            socket.emit('get_data');
            console.log('Evento "get_data" emitido');
        });

        socket.on('disconnect', () => {
            statusText.textContent = 'OFFLINE';
            statusBadge.classList.replace('bg-emerald-900/30', 'bg-slate-800');
            statusBadge.classList.add('text-slate-500');
        });
    </script>
</body>
</html>
